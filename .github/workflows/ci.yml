name: Strikefall CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.0
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run test:evidence
      - run: npm run test:sbf:report
      - run: npm test
      - run: npm run build
      - run: npm run test:wasm
      - run: npx playwright install --with-deps chrome webkit
      - run: npm run test:e2e
        env:
          CI: true
      - run: npm run test:qa:smoke
        env:
          CI: true
      - run: npm run test:qa:performance
        env:
          CI: true
      - run: npm run test:qa:soak
        env:
          CI: true
      - run: npm run test:qa:webkit
        env:
          CI: true

  rust:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: strikefall_test
          POSTGRES_USER: strikefall
          POSTGRES_PASSWORD: strikefall-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strikefall -d strikefall_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@b39830659426cc462634adb474604619960ae92d # 1.85.1
        with:
          targets: wasm32-unknown-unknown
          components: clippy,rustfmt
      - name: Install pinned RustSec auditor
        run: cargo install cargo-audit --version 0.22.0 --locked
      - name: Audit Rust dependency advisories
        run: bash scripts/audit-rust.sh
      - run: cargo fmt --all --check
      - run: cargo check -p strikefall-core --no-default-features --locked
      - run: cargo test --workspace --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo check -p strikefall-wasm --target wasm32-unknown-unknown --release --locked
      - run: cargo test -p strikefall-round-service --locked --test repository_contract -- --ignored
        env:
          STRIKEFALL_TEST_DATABASE_URL: postgres://strikefall:strikefall-ci@127.0.0.1:5432/strikefall_test

  model-and-decks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@b39830659426cc462634adb474604619960ae92d # 1.85.1
      - run: python -m pip install -r tools/model-validation/requirements.txt
      - run: npm run test:model
      - run: npm run test:decks

  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Generate ephemeral container-test secrets
        shell: bash
        run: |
          signing_key="$(openssl rand -hex 32)"
          postgres_password="$(openssl rand -hex 32)"
          echo "::add-mask::$signing_key"
          echo "::add-mask::$postgres_password"
          echo "STRIKEFALL_SIGNING_KEY=$signing_key" >> "$GITHUB_ENV"
          echo "POSTGRES_PASSWORD=$postgres_password" >> "$GITHUB_ENV"
          echo "STRIKEFALL_ALLOWED_ORIGIN=http://127.0.0.1:4173" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Validate production Compose topology
        run: npm run test:deployment:topology
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          load: true
          tags: |
            strikefall-round-service:ci
            strikefall-round-service:latest
          build-args: STRIKEFALL_BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=round-service
          cache-to: type=gha,scope=round-service,mode=max
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile.web
          push: false
          load: true
          tags: |
            strikefall-web:ci
            strikefall-web:latest
          build-args: STRIKEFALL_BUILD_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.0
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chrome
      - name: Start production-shaped stack
        run: docker compose up --detach --no-build --wait
      - name: Assert WASM-capable production CSP
        run: >-
          curl --fail --silent --show-error --head http://127.0.0.1:4173/
          | grep --fixed-strings --ignore-case "script-src 'self' 'wasm-unsafe-eval'"
      # Do not let an early benchmark failure upload the checked-in local
      # baseline under the current CI SHA. Only this run may recreate it.
      - name: Clear retained local API baseline
        run: rm --force tools/performance/report.json
      - name: Enforce authoritative round-create latency budget
        run: npm run test:performance:api
      - name: Validate round-create raw evidence
        run: npm run test:performance:report
      - name: Retain round-create raw evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: round-create-performance-${{ github.sha }}
          path: tools/performance/report.json
          if-no-files-found: error
          retention-days: 30
      - name: Enforce warm-cache ranked mobile interaction budget
        run: npm run test:performance:ranked-mobile
        env:
          CI: true
      # The API and browser performance gates intentionally consume the full
      # closed-alpha per-IP session allowance. Reset only test data so the
      # lifecycle lane remains independent; the already-built images remain.
      - name: Reset production stack after performance gates
        run: >-
          docker compose down --volumes
          && docker compose up --detach --no-build --wait
      - name: Exercise authoritative ranked lifecycle
        run: npm run test:e2e:ranked
        env:
          CI: true
      - name: Prove authoritative ranked Daily v3 lifecycle
        run: npm run test:e2e:ranked-daily
        env:
          CI: true
      - name: Capture production stack logs
        if: failure()
        run: docker compose logs --no-color --tail=500
      - name: Stop production-shaped stack
        if: always()
        run: docker compose down --volumes
